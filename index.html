  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #FD267A; }
    #ml-loading {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #FD267A 0%, #FF6036 100%);
      transition: opacity .45s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #ml-loading .heart {
      width: 78px; height: 78px;
      animation: ml-beat 1.2s ease-in-out infinite;
    }
    #ml-loading .word {
      margin-top: 22px; color: #fff; font-weight: 800; font-size: 30px; letter-spacing: -.5px;
      -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision;
    }
    #ml-loading .word small { opacity: .92; }
    #ml-loading .dots {
      margin-top: 18px; display: flex; gap: 7px;
    }
    #ml-loading .dots i {
      width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.85);
      animation: ml-bounce 1s infinite ease-in-out;
    }
    #ml-loading .dots i:nth-child(2) { animation-delay: .15s; }
    #ml-loading .dots i:nth-child(3) { animation-delay: .3s; }
    @keyframes ml-beat {
      0%,100% { transform: scale(1); } 25% { transform: scale(1.15); } 40% { transform: scale(1); } 60% { transform: scale(1.1); }
    }
    @keyframes ml-bounce {
      0%,80%,100% { transform: scale(.6); opacity: .5; } 40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="ml-loading">
    <svg class="heart" viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 21s-7.5-4.6-10-9.2C.6 9 1.7 5.4 5 4.6c2-.5 3.8.4 4.9 2 .4.6 1 1.4 2.1 1.4s1.7-.8 2.1-1.4c1.1-1.6 2.9-2.5 4.9-2 3.3.8 4.4 4.4 3 7.2C19.5 16.4 12 21 12 21z"/>
    </svg>
    <div class="word">Make<small>Love</small></div>
    <div class="dots"><i></i><i></i><i></i></div>
  </div>

  <script>
    // Flutter ilk kareyi çizince yükleme ekranını yumuşakça kaldır.
    (function () {
      function done() {
        var el = document.getElementById('ml-loading');
        if (!el) return;
        el.style.opacity = '0';
        setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 460);
      }
      var obs = new MutationObserver(function () {
        if (document.querySelector('flutter-view') || document.querySelector('flt-scene-host')) {
          done(); obs.disconnect();
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
      // Güvenlik: 12 sn sonra her halükârda kaldır.
      setTimeout(done, 12000);
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
